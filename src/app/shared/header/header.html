<div class="w-full shadow-md bg-white fixed top-0 left-0 z-50 px-4 sm:px-6 lg:px-8" id="header">

  <!-- Header -->
  <header class="max-w-7xl mx-auto flex items-center justify-between  py-4 relative">
    <!-- Logo -->
    <a routerLink="/" class="flex items-center text-2xl font-bold">
      <!-- <img src="" class="w-40 sm:w-48 md:w-56 lg:w-64 h-auto" alt="Dharstec Solutions Logo"> -->
      <span class="text-[#000080] mr-2">Dharstec </span> Solutions
    </a>

    <!-- Hamburger Button -->
    <button
      class="inline-flex p-2 text-gray-700 rounded-lg lg:hidden hover:bg-gray-200 focus:outline-none"
      (click)="mobileMenuOpen = !mobileMenuOpen">
      <mat-icon>{{ mobileMenuOpen ? 'close' : 'menu' }}</mat-icon>
    </button>

    <!-- Desktop Menu -->
    <nav class="hidden lg:flex lg:items-center lg:space-x-6 navitems">
      <a routerLink="/home" routerLinkActive="active">Home</a>
      <a routerLink="/about" routerLinkActive="active">About Us</a>
      <a routerLink="/about" routerLinkActive="active">Services</a>
      <a routerLink="/about" routerLinkActive="active">Portfolio</a>
      <a routerLink="/about" routerLinkActive="active">Contact us</a>
      <a routerLink="/about" routerLinkActive="active">Get a Quote</a>
    </nav>
  </header>

  <!-- Mobile Overlay Menu -->
  <div
    class="absolute top-full left-0 w-full bg-white text-gray-800 shadow-lg transition-all duration-300 ease-in-out lg:hidden"
    [ngClass]="{ 'block': mobileMenuOpen, 'hidden': !mobileMenuOpen }">
    <nav class="flex flex-col p-4 space-y-3 text-base font-medium">
      <a routerLink="/home" (click)="mobileMenuOpen=false" class="hover:text-green-700">Home</a>
      <a routerLink="/about" (click)="mobileMenuOpen=false" class="hover:text-green-700">About Us</a>
    </nav>
  </div>
</div>
