<div class="w-full fixed top-0 left-0 z-50 px-3 sm:px-6 lg:px-8 py-3" id="header">

  <!-- Header -->
  <header class="header-shell max-w-7xl mx-auto flex items-center justify-between py-2.5 px-3 sm:px-4 relative">
    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-3 text-2xl font-bold">
      <img [src]="logo" class="w-36 sm:w-40 h-auto" alt="Dharstec Solutions Logo">
      <span class="brand-subtitle hidden xl:inline text-sm font-semibold border-l pl-3 whitespace-nowrap">
        Software Studio
      </span>
    </a>

    <!-- Hamburger Button -->
    <button
      class="mobile-toggle inline-flex p-2 rounded-lg lg:hidden focus:outline-none"
      (click)="mobileMenuOpen = !mobileMenuOpen">
      <mat-icon>{{ mobileMenuOpen ? 'close' : 'menu' }}</mat-icon>
    </button>

    <!-- Desktop Menu -->
    <nav class="hidden lg:flex lg:items-center lg:space-x-1 navitems">
      <a routerLink="/home" routerLinkActive="active">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </a>
      <a routerLink="/about" routerLinkActive="active">
        <i class="fa-solid fa-building"></i>
        <span>About</span>
      </a>
      <a routerLink="/services" routerLinkActive="active">
        <i class="fa-solid fa-layer-group"></i>
        <span>Services</span>
      </a>
      <a routerLink="/portfolio" routerLinkActive="active">
        <i class="fa-solid fa-briefcase"></i>
        <span>Portfolio</span>
      </a>
      <a routerLink="/contact-us" routerLinkActive="active">
        <i class="fa-solid fa-paper-plane"></i>
        <span>Contact</span>
      </a>
      <a routerLink="/contact-us" class="btn-primary ml-2">
        <i class="fa-solid fa-arrow-right"></i>
        <span>Start Project</span>
      </a>
    </nav>
  </header>

  <!-- Mobile Overlay Menu -->
  <div
    class="absolute top-[calc(100%+8px)] left-4 right-4 text-gray-900 shadow-lg transition-all duration-300 ease-in-out lg:hidden glass rounded-2xl z-40"
    [ngClass]="{ 'block': mobileMenuOpen, 'hidden': !mobileMenuOpen }">
    <nav class="flex flex-col p-4 space-y-3 text-base font-medium  navitems">
      <a routerLink="/home" routerLinkActive="active" (click)="mobileMenuOpen=false">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </a>
      <a routerLink="/about" routerLinkActive="active" (click)="mobileMenuOpen=false">
        <i class="fa-solid fa-building"></i>
        <span>About</span>
      </a>
      <a routerLink="/services" routerLinkActive="active" (click)="mobileMenuOpen=false">
        <i class="fa-solid fa-layer-group"></i>
        <span>Services</span>
      </a>
      <a routerLink="/portfolio" routerLinkActive="active" (click)="mobileMenuOpen=false">
        <i class="fa-solid fa-briefcase"></i>
        <span>Portfolio</span>
      </a>
      <a routerLink="/contact-us" routerLinkActive="active" (click)="mobileMenuOpen=false">
        <i class="fa-solid fa-paper-plane"></i>
        <span>Contact</span>
      </a>
      <a routerLink="/contact-us" class="btn-primary ml-2" (click)="mobileMenuOpen=false">
        <i class="fa-solid fa-arrow-right"></i>
        <span>Start Project</span>
      </a>
    </nav>
  </div>
</div>
