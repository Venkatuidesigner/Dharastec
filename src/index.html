  <script>
    (function () {
      var redirect = window.location.search.match(/^\?\/(.*)/);
      if (redirect) {
        window.history.replaceState(
          null,
          '',
          window.location.pathname.replace(/\/$/, '') + '/' + redirect[1] + window.location.hash
        );
      }
    })();
