name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Print tool versions
        run: |
          node -v
          npm -v
          npx ng version || true

      - name: Build Angular app
        run: npm run build -- --configuration production --base-href "/${{ github.event.repository.name }}/"

      - name: Resolve publish directory
        id: resolve_publish_dir
        shell: bash
        run: |
          set -euo pipefail
          echo "Repository name: ${{ github.event.repository.name }}"
          echo "Dist tree:"
          ls -la || true
          ls -la dist || true
          find dist -maxdepth 4 -type d -print || true

          publish_dir="$(ls -d dist/*/browser 2>/dev/null | head -n 1 || true)"
          if [[ -z "${publish_dir}" ]]; then
            echo "ERROR: Could not find build output under dist/*/browser"
            exit 1
          fi

          echo "Using publish_dir=${publish_dir}"
          echo "publish_dir=${publish_dir}" >> "${GITHUB_OUTPUT}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.resolve_publish_dir.outputs.publish_dir }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
